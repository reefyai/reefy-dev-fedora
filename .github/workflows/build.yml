name: Build reefy-dev-fedora image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version tag
        id: tag
        run: |
          # Tag: <fedora_version>-<YYYY.MM.DD>-<run_number>
          # Immutable per build; same-day rebuilds get -1, -2, ... so
          # downstream pinning can pick up rebuilds without hash games.
          echo "version=45-$(date -u +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/reefyai/reefy-dev-fedora:${{ steps.tag.outputs.version }}
            ghcr.io/reefyai/reefy-dev-fedora:45
            ghcr.io/reefyai/reefy-dev-fedora:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: echo "Pushed ghcr.io/reefyai/reefy-dev-fedora:${{ steps.tag.outputs.version }}"
